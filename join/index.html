<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>加入家族 - 我家有谱</title><style>
:root{--bg:#f4f6f5;--surface:#fff;--line:#d4ddd8;--text:#17231f;--muted:#64726b;--accent:#1f6f7a;--danger:#a33d45;font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:20px;background:var(--bg);color:var(--text)}main{width:min(520px,100%);padding:28px;border:1px solid var(--line);border-radius:4px;background:var(--surface);box-shadow:0 22px 60px rgba(31,62,53,.1)}.brand{display:flex;align-items:center;gap:10px;margin-bottom:26px;font-weight:800}.mark{display:grid;place-items:center;width:30px;height:30px;border:1px solid #a7c8ca;border-radius:4px;background:#dbeff0;color:var(--accent)}h1{margin:0 0 8px;font-size:24px}p{color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}label{display:grid;gap:7px;margin:0 0 14px;font-size:12px;font-weight:700}input,select,button{height:40px;padding:0 11px;border:1px solid #c8d2cd;border-radius:4px;background:#fff;font:inherit}input:focus,select:focus{outline:2px solid rgba(31,111,122,.15);border-color:var(--accent)}button{cursor:pointer;font-weight:800}button.primary{width:100%;border-color:var(--accent);background:var(--accent);color:#fff}button:disabled{opacity:.55}.message{min-height:22px;margin-top:10px;color:var(--muted);font-size:12px}.message.error{color:var(--danger)}.state{padding:16px;border:1px solid var(--line);background:#f8faf9}.otp-row{display:flex;gap:8px}.otp-row input{flex:1}.otp-row button{white-space:nowrap}.hidden{display:none!important}@media(max-width:560px){.grid{grid-template-columns:1fr}main{padding:22px}}</style></head>
<body><main><div class="brand"><span class="mark">谱</span><span>我家有谱</span></div><section id="inviteLoading" class="state">正在验证邀请链接...</section><section id="inviteUnavailable" class="state hidden"><h1>邀请暂不可用</h1><p id="unavailableText">邀请可能已过期或被撤销。</p><a href="/">返回首页</a></section><form id="joinForm" class="hidden"><h1>加入 <span id="familyName"></span></h1><p>填写本人资料并验证邮箱，系统会为您创建个人档案。</p><div class="grid"><label>姓名<input id="joinName" required maxlength="80" autocomplete="name"></label><label>性别<select id="joinGender" required><option value="">请选择</option><option value="male">男</option><option value="female">女</option><option value="other">其他</option></select></label><label>邮箱<input id="joinEmail" type="email" required autocomplete="email"></label><label>手机号<input id="joinPhone" inputmode="tel" required autocomplete="tel"></label></div><button class="primary" id="requestOtp" type="submit">发送邮箱登录邮件</button><div id="joinMessage" class="message" role="status"></div></form><form id="otpForm" class="hidden"><h1>验证邮箱</h1><p>登录邮件已发送至 <strong id="otpEmail"></strong>。可点击邮件中的安全链接；若邮件中显示六位验证码，也可在下方输入。</p><label>六位验证码<div class="otp-row"><input id="joinOtp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code"><button type="button" id="resendOtp" disabled>60 秒后重发</button></div></label><button class="primary" type="submit">验证并加入家族</button><div id="otpMessage" class="message" role="status"></div></form></main><script src="../config.js"></script><script src="../vendor/supabase-2.109.0.js"></script><script type="module" src="family-join.js"></script></body></html>
